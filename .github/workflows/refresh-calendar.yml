name: Refresh Calendar

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:       # allow manual trigger from GitHub UI

jobs:
  fetch-ical:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch iCal feed
        run: |
          curl -sSf \
            "https://calendar.avantio.pro/v1/62cf225e-dfd7-4a3d-9816-d5c8a5ffd4c4.ics" \
            -o calendar.ics

      - name: Commit updated calendar
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add calendar.ics
          git diff --cached --quiet || git commit -m "chore: refresh calendar.ics"
          git push
